# Group C — Param Optimization | method=optuna
features:
  numerical: true
  categorical: true
  temporal: true
  text: false

categorical:
  smoothing: 1.0

selection:
  method: mutual_info
  k: 50

extraction:
  method: none

models:
  - catboost

param_optimize:
  method: optuna
  cv: 3
  n_trials: 30
  timeout: 300

min_class_samples: 5

mlflow:
  experiment_name: p2_param_optimize
  tracking_uri: sqlite:///mlflow.db

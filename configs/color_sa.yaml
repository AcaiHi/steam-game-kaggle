representation: coloring
algorithm: color_sa
run_name: color_sa
iterations: 100
temperature: 1.0
cooling_rate: 0.995
moves_per_iter: 80
seed: 42
n_colors: 8

sample_filter:
  enabled: true
  mode: all_positive
  columns: [pct_pos_total, average_playtime_forever, peak_ccu]

dimensions:
  rating:
    features: [pct_pos_total]
    aggregation: mean
  playtime:
    features: [average_playtime_forever]
    aggregation: mean
    log_scale: true
  hotness:
    features: [peak_ccu]
    aggregation: mean
    log_scale: true

constraints:
  enabled: true
  min_cluster_size: 50
  infeasible_score: 1000000.0
  violation_weight: 1.0

objective:
  intra_weight: 1.0
  inter_weight: 1.0
  penalty_per_missing: 0.5

mlflow:
  experiment_name: phase1_coloring
  tracking_uri: sqlite:///mlflow.db

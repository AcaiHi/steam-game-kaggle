algorithm: pso
iterations: 200
population: 50
inertia: 0.7
cognitive: 1.5
social: 1.5

dimensions:
  rating:
    features: [pct_pos_total]
    aggregation: mean
  playtime:
    features: [average_playtime_forever]
    aggregation: mean
  hotness:
    features: [peak_ccu]
    aggregation: mean

objective:
  intra_weight: 1.0
  inter_weight: 1.0
  penalty_per_missing: 0.5

adaptive:
  enabled: false

mlflow:
  experiment_name: phase1_clustering
  tracking_uri: sqlite:///mlflow.db

# Group B — Feature Selection | method=mutual_info
features:
  numerical: true
  categorical: true
  temporal: true
  text: false

categorical:
  smoothing: 1.0

selection:
  method: mutual_info
  k: 50

extraction:
  method: none

models:
  - catboost

param_optimize:
  method: none
  cv: 3

min_class_samples: 5

mlflow:
  experiment_name: p2_feature_selection
  tracking_uri: sqlite:///mlflow.db

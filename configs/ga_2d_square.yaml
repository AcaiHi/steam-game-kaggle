algorithm: ga
iterations: 100
population: 10

initial_solution:
  enabled: true
  method: midpoint
  value: 0.5

sample_filter:
  enabled: true
  mode: all_positive
  columns: [pct_pos_total, average_playtime_forever, peak_ccu]

dimensions:
  rating:
    features: [pct_pos_total]
    aggregation: mean
  engagement:
    features: [average_playtime_forever, peak_ccu]
    aggregation: mean
    log_scale: true
    transform: square

objective:
  intra_weight: 1.0
  inter_weight: 1.0
  penalty_per_missing: 0.5

adaptive:
  enabled: true
  strategy: aps2
  sigma_explore: 0.05
  sigma_local: 0.01
  probe_eps: 0.02
  levy_beta: 1.5
  direction_quality_weight: 0.3
  min_cluster_size: 50
  target_dominant_pct: 0.5
  formation_weight: 1.0
  dominant_weight: 1.0

mlflow:
  experiment_name: phase1_clustering
  tracking_uri: sqlite:///mlflow.db

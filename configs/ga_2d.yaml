algorithm: ga
iterations: 100
population: 10

initial_solution:
  enabled: true
  method: midpoint
  value: 0.5

sample_filter:
  enabled: true
  mode: all_positive
  columns: [pct_pos_total, average_playtime_forever, peak_ccu]

dimensions:
  rating:
    features: [pct_pos_total]
    aggregation: mean
  engagement:
    features: [average_playtime_forever, peak_ccu]
    aggregation: mean
    log_scale: true

objective:
  intra_weight: 1.0
  inter_weight: 1.0
  penalty_per_missing: 0.5

adaptive:
  enabled: false

mlflow:
  experiment_name: phase1_clustering
  tracking_uri: sqlite:///mlflow.db

